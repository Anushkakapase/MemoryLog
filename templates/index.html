<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - MemoryLog</title>

    <link rel="stylesheet" href="/static/style.css">

    <style>

        body{
            margin:0;
            padding:0;
            font-family: 'Poppins', sans-serif;
            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background: linear-gradient(to right, #0f1b4c, #243b9f);
        }

        .login-box{
            width:420px;
            background:#f5f5f5;

            padding:45px;
            border-radius:18px;

            box-shadow:0 15px 35px rgba(0,0,0,0.25);
        }

        .login-box h2{
            text-align:center;
            margin-bottom:30px;
            font-size:42px;
        }

        .login-box label{
            display:block;
            margin-bottom:8px;
            margin-top:18px;
            font-size:16px;
            color:#222;
        }

        .login-box input{
            width:100%;
            padding:14px;

            border:1px solid #ccc;
            border-radius:10px;

            font-size:15px;
            outline:none;

            box-sizing:border-box;
        }

        .login-box input:focus{
            border:2px solid #2f5bea;
        }

        .login-btn{
            width:100%;
            padding:14px;

            margin-top:28px;

            background:#2f5bea;
            color:white;

            border:none;
            border-radius:10px;

            font-size:16px;
            cursor:pointer;

            transition:0.3s;
        }

        .login-btn:hover{
            background:#1e47d3;
        }

        .bottom-text{
            text-align:center;
            margin-top:20px;
            font-size:16px;
        }

        .bottom-text a{
            text-decoration:none;
            color:#2f5bea;
            font-weight:600;
        }

        .error-box{
            background:#ffe1e1;
            color:red;
            padding:12px;
            border-radius:8px;
            text-align:center;
            margin-bottom:15px;
        }

    </style>
</head>

<body>

    <div class="login-box">

        <h2>🔐 Login</h2>

        {% if error %}
            <div class="error-box">
                {{ error }}
            </div>
        {% endif %}

        {% if success %}
            <div style="
                background:#d4ffd4;
                color:green;
                padding:12px;
                border-radius:8px;
                text-align:center;
                margin-bottom:15px;
            ">
                {{ success }}
            </div>
        {% endif %}

        <form action="/login" method="POST">

            <label>Email</label>
            <input
                type="text"
                name="username"
                placeholder="Enter your email"
                required
            >

            <label>Password</label>
            <input
                type="password"
                name="password"
                placeholder="Enter your password"
                required
            >

            <button type="submit" class="login-btn">
                Login
            </button>

        </form>

        <div class="bottom-text">
            New user?
            <a href="/register">Register</a>
        </div>

    </div>

</body>
</html>
