<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMORYLOG - Detect. Support. Remember</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <nav>
        <div class="logo">MEMORYLOG</div>
        <div class="nav-links">
            {% if session.user %}
                <span>Hello, {{ session.user }} ({{ session.role }})</span>
                <a href="/logout">Logout</a>
            {% endif %}
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
