<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Matching Game</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        /* --- NEW GAME CSS --- */
        .game-info {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
            font-size: 1.2rem;
            color: #333;
        }

        .matching-grid {
            display: grid;
            grid-template-columns: repeat(4, 120px); /* 4 Columns */
            gap: 15px;
            justify-content: center;
            margin: 0 auto;
        }

        /* Card Container */
        .card-tile {
            width: 120px;
            height: 120px;
            background-color: transparent;
            perspective: 1000px; /* Essential for 3D flip */
            cursor: pointer;
            border: none; /* Reset standard border */
        }

        /* The Flipper (Inner Container) */
        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 10px;
        }

        /* Flip Action */
        .card-tile.flipped .card-inner {
            transform: rotateY(180deg);
        }

        /* Front & Back Sides */
        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            -webkit-backface-visibility: hidden; /* Safari */
            backface-visibility: hidden;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Front (Face Down) */
        .card-front {
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: white;
            font-size: 2.5rem;
        }

        /* Back (Face Up - Image) */
        .card-back {
            background-color: white;
            border: 2px solid #6e8efb;
            transform: rotateY(180deg);
        }

        .card-back img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-logo">MemoryLog</div>
        <a href="/dashboard" class="btn-logout">Exit</a>
    </nav>

    <div class="container">
        <h2>Matching Pairs</h2>
        
        <div class="game-info">
            <span>🔄 Moves: <b id="move-count">0</b></span>
            <span>⏱️ Time: <b id="time-count">0s</b></span>
        </div>

        <div id="game-board-matching" class="matching-grid"></div>
    </div>

    <script src="/static/script.js"></script>
    <script>initMatching();</script>
</body>
</html>
